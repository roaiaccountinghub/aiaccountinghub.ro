<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    background: #07121a;
    font-family: 'Space Grotesk', 'Inter', sans-serif;
    position: relative;
  }

  /* Grid background */
  .grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(34,211,238,0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(34,211,238,0.06) 1px, transparent 1px);
    background-size: 60px 60px;
  }

  /* Gradient overlays */
  .glow-left {
    position: absolute;
    left: -100px;
    top: -100px;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(8,145,178,0.25) 0%, transparent 70%);
  }
  .glow-right {
    position: absolute;
    right: -50px;
    bottom: -50px;
    width: 400px;
    height: 400px;
    background: radial-gradient(circle, rgba(13,148,136,0.2) 0%, transparent 70%);
  }

  /* Top border accent */
  .top-bar {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: linear-gradient(90deg, #0891b2, #22d3ee, #0d9488);
  }

  /* Main content */
  .content {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 60px 80px;
  }

  /* Logo row */
  .logo-row {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 40px;
  }
  .logo-icon {
    width: 52px;
    height: 52px;
    flex-shrink: 0;
  }
  .logo-text {
    font-size: 22px;
    font-weight: 600;
    color: #e8f3f8;
    letter-spacing: -0.3px;
  }

  /* Main heading */
  .heading {
    font-size: 52px;
    font-weight: 700;
    color: #e8f3f8;
    line-height: 1.15;
    letter-spacing: -1px;
    margin-bottom: 20px;
    max-width: 860px;
  }
  .heading .accent {
    color: #22d3ee;
  }

  /* Tagline */
  .tagline {
    font-size: 22px;
    color: #8ba9b8;
    font-weight: 400;
    max-width: 700px;
    line-height: 1.5;
  }

  /* Bottom domain badge */
  .domain {
    position: absolute;
    bottom: 40px;
    right: 80px;
    background: rgba(34,211,238,0.1);
    border: 1px solid rgba(34,211,238,0.25);
    border-radius: 8px;
    padding: 8px 18px;
    font-size: 16px;
    color: #22d3ee;
    font-weight: 500;
  }
</style>
</head>
<body>
  <div class="grid"></div>
  <div class="glow-left"></div>
  <div class="glow-right"></div>
  <div class="top-bar"></div>

  <div class="content">
    <div class="logo-row">
      <svg class="logo-icon" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#0891b2"/>
            <stop offset="100%" stop-color="#0d9488"/>
          </linearGradient>
        </defs>
        <rect width="32" height="32" rx="7" fill="url(#bg)"/>
        <rect x="10" y="17" width="12" height="9" rx="1" fill="white" opacity="0.95"/>
        <polygon points="16,7 6,18 8,18 16,10 24,18 26,18" fill="white" opacity="0.95"/>
        <rect x="13.5" y="20" width="5" height="6" rx="1" fill="#0e7490"/>
      </svg>
      <span class="logo-text">AI Accounting Hub</span>
    </div>

    <div class="heading">
      Unde <span class="accent">Inteligența Artificială</span><br>
      întâlnește Contabilitatea
    </div>

    <div class="tagline">
      Resurse, analize și strategii pentru profesioniștii contabili din România
    </div>
  </div>

  <div class="domain">aiaccountinghub.ro</div>
</body>
</html>
